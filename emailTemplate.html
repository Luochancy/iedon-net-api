<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui2@0.1.0/dist/css/mdui.min.css">
    <title>{{title}}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
              "PingFang SC", "Microsoft YaHei", sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 24px auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            text-align: center;
            background-color: #94CCFF;
            color: white;
            padding: 10px 0;
        }
        .header img {
            max-width: 150px;
            height: auto;
        }
        .content {
            margin: 20px 0;
            text-align: center;
            color: #000;
        }
        .code {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #777;
            font-size: 12px;
            margin-top: 20px;
            border-top: 1px solid #eaeaea;
            padding-top: 10px;
        }
    </style>
</head>
<body class="mdui-theme-primary-indigo mdui-theme-accent-pink">
    <div class="container mdui-shadow-3">
        <div class="header">
            <img src="https://apac-r2.luochancy.com/img/luocynet-logo-bai.png" alt="Logo">
            <h1>{{title}}</h1>
        </div>
        <div class="content">
            {{content}}
        </div>
        <div class="footer">
            <p>如果你没有请求此邮件，请忽略。<br>If you did not request this email, please ignore it.</p>
            <p>© LuocyNetwork All rights reserved.</p>
        </div>
    </div>
</body>
</html>
