<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f5f7fb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }
      .container {
        max-width: 600px;
        margin: 24px auto;
        background: #ffffff;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      }
      .header {
        background: #94ccff;
        color: #fff;
        text-align: center;
        padding: 20px;
      }
      .logo {
        max-width: 160px;
        height: auto;
        margin-bottom: 8px;
      }
      .content {
        padding: 24px;
        color: #111;
      }
      .code {
        font-size: 22px;
        letter-spacing: 2px;
        font-weight: 700;
        color: #1f2d3d;
        background: #eef3ff;
        padding: 12px 16px;
        border-radius: 8px;
        word-break: break-all;
        text-align: center;
        margin: 16px 0;
      }
      .footer {
        padding: 16px 24px 24px;
        color: #777;
        font-size: 12px;
        text-align: center;
        border-top: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <img alt="Logo" class="logo" src="https://apac-r2.luochancy.com/img/luocynet-logo-bai.png" />
        <h1>{{title}}</h1>
      </div>
      <div class="content">
        {{content}}
      </div>
      <div class="footer">
        &copy; LuocyNet DN42
      </div>
    </div>
  </body>
</html>
